<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Certified Architect Exam Prep & Lab Portal</title>
  <meta name="description" content="Prepare for the official Anthropic Claude Certified Architect (CCA) foundations certification with interactive scenario mock exams, visual agentic workflow builders, and MCP sandboxes.">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  
  <div id="app-shell">
    
    <!-- Sidebar Navigation -->
    <aside class="sidebar">
      <div class="brand-section">
        <span class="brand-logo">⚛</span>
        <div class="brand-info">
          <span class="brand-title">Claude Architect</span>
          <div class="badge status-amber" style="margin: 0; font-size: 9px; padding: 2px 4px;">Prep & Lab Portal</div>
        </div>
      </div>

      <nav class="sidebar-menu">
        <div class="sidebar-nav-item active" data-view="dashboard" id="nav-dashboard">
          <span class="nav-icon">📊</span> <span>Dashboard</span>
        </div>
        <div class="sidebar-nav-item" data-view="exam" id="nav-exam">
          <span class="nav-icon">✍️</span> <span>Exam Simulator</span>
        </div>
        <div class="sidebar-nav-item" data-view="workflow" id="nav-workflow">
          <span class="nav-icon">🧪</span> <span>Workflow Canvas</span>
        </div>
        <div class="sidebar-nav-item" data-view="mcp" id="nav-mcp">
          <span class="nav-icon">🗄️</span> <span>MCP Sandbox</span>
        </div>
        <div class="sidebar-nav-item" data-view="cli" id="nav-cli">
          <span class="nav-icon">⌨️</span> <span>Claude Code CLI</span>
        </div>
      </nav>

      <div class="sidebar-footer">
        <span class="footer-text">Claude Certified Architect</span>
        <span class="footer-text" style="color: var(--text-muted);">Syllabus Prep v1.0.0</span>
      </div>
    </aside>

    <!-- Main Viewport Context -->
    <main class="main-viewport">
      
      <!-- Module 1: Dashboard -->
      <section id="dashboard-section" class="view-section active">
        <!-- Dashboard components will mount here -->
      </section>

      <!-- Module 2: Exam Mock Simulator -->
      <section id="exam-section" class="view-section" style="display: none;">
        <!-- Exam Workspace will mount here -->
      </section>

      <!-- Module 3: Visual Workflow Lab -->
      <section id="workflow-section" class="view-section" style="display: none;">
        <!-- Canvas Visuals will mount here -->
      </section>

      <!-- Module 4: MCP Sandbox -->
      <section id="mcp-section" class="view-section" style="display: none;">
        <!-- MCP Sandbox will mount here -->
      </section>

      <!-- Module 5: Claude Code CLI -->
      <section id="cli-section" class="view-section" style="display: none;">
        <!-- CLI Workspace will mount here -->
      </section>

    </main>

  </div>

  <!-- Bootstrapping main orchestrator -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
